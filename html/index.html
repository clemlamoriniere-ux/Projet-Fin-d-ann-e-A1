<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Page Title</title>
</head>

<body>

    <h1>Projet orbites</h1>
    <p>charger le fichier json pour commencer</p>
    <p>maintenir le bouton gauche de la souris enfoncé pour animer la trajectoire</p>
    <p id="demo"></p>

    <script src="./Page Title_files/p5.min.js.téléchargement"></script>

    <input type="file" onchange="readFile(this)">

    <script type="text/javascript">



        let echelle = 1000000000;
        let reader = new FileReader();
        let file;
        let dataJSON;
        let method;

        function readFile(input) {
            let file = input.files[0];

            let reader = new FileReader();

            reader.readAsText(file);

            reader.onload = function () {
                dataJSON = JSON.parse(reader.result);
                method = Object.keys(dataJSON)[0];

                console.log(dataJSON[method]);
                for (let i = 0; i < 3750; i++) {
                    point(200 + dataJSON[method][i][0][0] / echelle, 200 + dataJSON[method][i][0][1] / echelle);
                    i++;
                }
                stroke(255, 0, 0);
                fill(0, 100, 200);
                circle(200 + dataJSON[method][0][0][0] / echelle, 200 + dataJSON[method][0][0][1] / echelle, 10);

            };

            reader.onerror = function () {
                console.log(reader.error);
            };

        }

        function preload() {

            button = createButton("reset");
            button.mousePressed(reset);



        }

        function reset() {
            a = 0;
            loop();
            noLoop();

        }

        function mousePressed() {
            if (mouseButton === LEFT) {
                loop();
            }
        }

        function mouseReleased() {
            noLoop();
        }

        function setup() {
            noLoop()
            createCanvas(720, 400);
            stroke(255, 255, 0);
            fill(255, 255, 0);
            circle(200, 200, 30);
            a = 0;
        }

        function draw() {
            background(0);
            stroke(255, 255, 0);
            fill(255, 255, 0);
            circle(200, 200, 30);
            stroke(255, 0, 0);
            fill(0, 100, 200);
            circle(200 + dataJSON[method][a][0][0] / echelle, 200 + dataJSON[method][a][0][1] / echelle, 10);

            if (a < 36501) { a = a + 1; }
            else { a = 0; }
        }



    </script>


</body>

</html>
